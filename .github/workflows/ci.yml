name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: npm run build
      - name: verify backend.pdf is up to date
        run: |
          if ! git diff --quiet -- backend.pdf; then
            echo "backend.pdf is stale. run 'npm run build' and commit it."
            exit 1
          fi
